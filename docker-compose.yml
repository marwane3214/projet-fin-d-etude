services:
  # ==================== Infrastructure ====================
  postgres:
    image: postgres:15-alpine
    container_name: cimr-postgres
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      POSTGRES_USER: cimr
      POSTGRES_PASSWORD: cimr_secret_2024
      POSTGRES_MULTIPLE_DATABASES: cimr_auth,cimr_affiliation,cimr_contributions,cimr_liquidation,cimr_payments,cimr_reversion,cimr_admin
    command: [ "postgres", "-c", "max_connections=300" ]
    ports: [ "5435:5432" ]
    volumes:
      - ./infra/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
      - postgres_data:/var/lib/postgresql/data
    networks: [ cimr-network ]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: cimr-zookeeper
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [ cimr-network ]

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: cimr-kafka
    mem_limit: 512m
    memswap_limit: 512m
    depends_on: [ zookeeper ]
    ports: [ "9092:9092" ]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
    networks: [ cimr-network ]

  # ==================== Microservices ====================
  auth-service:
    build: { context: ., target: auth-service }
    container_name: auth-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_auth
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on: [ postgres, kafka ]
    networks: [ cimr-network ]

  api-gateway:
    build: { context: ., target: api-gateway }
    container_name: api-gateway
    mem_limit: 768m
    memswap_limit: 768m
    ports: [ "8080:8080" ]
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8079
      - AFFILIATION_SERVICE_URL=http://affiliation-service:8081
      - CONTRIBUTION_SERVICE_URL=http://contribution-service:8082
      - LIQUIDATION_SERVICE_URL=http://liquidation-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - REVERSION_SERVICE_URL=http://reversion-service:8085
      - ADMIN_SERVICE_URL=http://admin-service:8086
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    depends_on: [ auth-service ]
    networks: [ cimr-network ]

  affiliation-service:
    build: { context: ., target: affiliation-service }
    container_name: affiliation-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_affiliation
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    depends_on: [ postgres, kafka ]
    networks: [ cimr-network ]

  contribution-service:
    build: { context: ., target: contribution-service }
    container_name: contribution-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_contributions
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    volumes:
      - ./backend/contribution-service/uploads:/app/uploads
    depends_on: [ postgres, kafka ]
    ports:
      - "8082:8082"
    networks: [ cimr-network ]

  liquidation-service:
    build: { context: ., target: liquidation-service }
    container_name: liquidation-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_liquidation
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=false
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    volumes:
      - ./backend/liquidation-service/uploads:/app/uploads
    depends_on: [ postgres, kafka ]
    networks: [ cimr-network ]

  payment-service:
    build: { context: ., target: payment-service }
    container_name: payment-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_payments
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    depends_on: [ postgres, kafka ]
    ports: [ "8084:8084" ]
    networks: [ cimr-network ]


  reversion-service:
    build: { context: ., target: reversion-service }
    container_name: reversion-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_reversion
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    depends_on: [ postgres, kafka ]
    ports: [ "8085:8085" ]
    networks: [ cimr-network ]

  admin-service:
    build: { context: ., target: admin-service }
    container_name: admin-service
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cimr_admin
      - SPRING_DATASOURCE_USERNAME=cimr
      - SPRING_DATASOURCE_PASSWORD=cimr_secret_2024
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ADMIN_EMAIL=${MAIL_ADMIN_EMAIL:-support@cimr.ma}
    depends_on: [ postgres, kafka ]
    ports: [ "8086:8086" ]
    networks: [ cimr-network ]

  saga-orchestrator:
    build: { context: ., target: saga-orchestrator }
    container_name: saga-orchestrator
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
    depends_on: [ kafka ]
    networks: [ cimr-network ]

networks:
  cimr-network:
    driver: bridge

volumes:
  postgres_data:
