apiVersion: apps/v1
kind: Deployment
metadata:
  name: affiliation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: affiliation-service
  template:
    metadata:
      labels:
        app: affiliation-service
    spec:
      containers:
      - name: affiliation-service
        image: cimr/affiliation-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-service:5432/cimr_affiliation
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: kafka-service:9092
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: affiliation-service
spec:
  selector:
    app: affiliation-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
