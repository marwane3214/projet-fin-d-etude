spring:
  application:
    name: reversion-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cimr_reversion}
    username: ${SPRING_DATASOURCE_USERNAME:cimr}
    password: ${SPRING_DATASOURCE_PASSWORD:cimr_secret_2024}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8085

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
